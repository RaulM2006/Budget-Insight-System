plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'org.springframework.boot' version '3.2.5'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.bis'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

javafx {
    version = '21'
    modules = ['javafx.controls', 'javafx.fxml']
}

dependencies {
    // Spring Boot (no embedded server needed — we use Spring context only)
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-autoconfigure'

    // PostgreSQL driver
    runtimeOnly 'org.postgresql:postgresql'

    // Password hashing
    implementation 'org.springframework.security:spring-security-crypto:6.2.4'
    implementation 'org.bouncycastle:bcpkix-jdk18on:1.77'

    // CSV parsing
    implementation 'com.opencsv:opencsv:5.9'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'com.h2database:h2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

run {
    doFirst {
        jvmArgs = [
                '--module-path', configurations.runtimeClasspath.asPath,
                '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

application {
    mainClass = 'com.bis.BisApplication'
}

test {
    useJUnitPlatform()
}
